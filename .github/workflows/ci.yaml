name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  self:
    name: Self Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tools
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run self tests
        run: python3 tests/all.py
