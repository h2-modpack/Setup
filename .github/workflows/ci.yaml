name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  self:
    name: Self Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tools
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.2"

      - name: Parse Python sources
        run: python -m compileall -q .

      - name: Run Python tests
        run: python test_all.py --python-only

      - name: Parse Lua test sources
        run: find tests -type f -name '*.lua' -print0 | xargs -0 -r -n1 luac -p
